name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps for validation
        run: |
          python -m pip install --upgrade pip
          pip install \
            openai \
            langgraph \
            langchain \
            langchain-openai \
            pydantic \
            rich \
            requests \
            pytest

      - name: Compile checks
        run: |
          python -m py_compile config.py main.py workflow/*.py agents/*.py tools/*.py prompts/*.py

      - name: Unit tests
        run: |
          pytest -q
